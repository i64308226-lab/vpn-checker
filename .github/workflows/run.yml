name: VPN Website Fetcher

on:
  workflow_dispatch:

jobs:
  connect-and-fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: pip install requests[socks]

    - name: Install and Run VPN Client
      env:
        VPN_KEY: ${{ secrets.GEN_VPN_KEY }}
      run: |
        # 1. Устанавливаем sing-box
        sudo bash -c "$(curl -fsSL https://sing-box.app/deb.sh)" install sing-box
        
        # 2. Генерируем валидный JSON-конфиг, где входящим протоколом будет SOCKS5 на порту 1080,
        # а исходящим — твой ключ из Gen VPN.
        sudo sing-box generate -o config.json "$VPN_KEY" 2>/dev/null || true
        
        # Если генерация через команду 'generate' не сработала для этого типа ссылки,
        # создаем чистый рабочий конфиг через встроенный инструмент форматирования
        if [ ! -f config.json ] || [ ! -s config.json ]; then
          sudo sing-box format -c <(echo "$VPN_KEY") > config.json 2>/dev/null || true
        fi
        
        # На случай, если sing-box капризничает с форматированием, проверим файл.
        # Если он пустой, просто отдадим ссылку напрямую утилите
        if [ ! -s config.json ]; then
          echo "Запуск напрямую через URI..."
          sudo sing-box run -c <(echo "$VPN_KEY") &
        else
          echo "Запуск через сгенерированный конфиг..."
          # Принудительно выставляем локальный порт 1080 во входящие подключения, если это возможно
          sed -i 's/"server_port": [0-9]*/"server_port": 1080/g' config.json 2>/dev/null || true
          sudo sing-box run -c config.json &
        fi
        
        # Даем 7 секунд на инициализацию туннеля и хэндшейк
        sleep 7
        
        # Проверим, поднялся ли локальный порт 1080
        sudo ss -tulpn | grep 1080 || echo "Предупреждение: Порт 1080 не обнаружен в системе!"

    - name: Visit Website via VPN
      run: |
        python -c "
        import requests
        
        proxies = {
            'http': 'socks5h://127.0.0.1:1080',
            'https': 'socks5h://127.0.0.1:1080'
        }

        try:
            print('Попытка №2 зайти на vpn.works через Gen VPN...')
            response = requests.get('https://vpn.works', proxies=proxies, timeout=15)
            
            print(f'\n[УСПЕХ] Сайт ответил кодом: {response.status_code}')
            print('='*40)
            print('Кусочек содержимого сайта:')
            print(response.text[:600])
            print('='*40)
            
        except Exception as e:
            print(f'\n[ОШИБКА] Порт открылся, но трафик не идет или упал с ошибкой: {e}')
        "
