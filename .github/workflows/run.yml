name: VPN Website Fetcher

on:
  workflow_dispatch:

jobs:
  connect-and-fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: pip install requests[socks]

    - name: Run VPN Client via Docker
      env:
        VPN_KEY: ${{ secrets.GEN_VPN_KEY }}
      run: |
        echo "Запуск официального контейнера Xray..."
        
        # Запускаем контейнер xray, передавая ему ключ напрямую в команду запуска.
        # Контейнер сам создаст SOCKS5 прокси внутри себя на порту 10808, а мы пробросим его наружу.
        docker run -d \
          --name vpn-tunnel \
          --restart always \
          -p 10808:10808 \
          -e XRAY_VMESS_AEAD_FORCED=false \
          teddysun/xray \
          xray run -config <(echo '{"inbounds":[{"port":10808,"protocol":"socks","settings":{"udp":true}}],"outbounds":[{"protocol":"vless","settings":{"vnext":[{"address":"'$(echo "$VPN_KEY" | sed -E 's/vless:\/\/([^@]+)@([^:]+):([0-9]+).*/\2/')'","port":'$(echo "$VPN_KEY" | sed -E 's/vless:\/\/([^@]+)@([^:]+):([0-9]+).*/\3/')',"users":[{"id":"'$(echo "$VPN_KEY" | sed -E 's/vless:\/\/([^@]+)@.*/\1/')'","encryption":"none"}]}]}}]}') || true

        # Если скрипт выше слишком сложный для парсинга регулярками,
        # применим самый «тупой» и надежный способ: python-скрипт, который создаст идеальный файл конфига.
        python -c "
        import json, os, re
        
        uri = os.environ['VPN_KEY'].strip()
        
        # Парсим vless / vmess / shadowsocks / trojan ссылку
        # Для простоты создаем универсальный рабочий клиентский конфиг xray
        try:
            # Выдергиваем из ссылки хост, порт и UUID
            match = re.match(r'vless://([^@]+)@([^:]+):([0-9]+)', uri)
            if match:
                uuid, host, port = match.groups()
                config = {
                    'inbounds': [{'port': 10808, 'protocol': 'socks', 'settings': {'udp': True}, 'sniffing': {'enabled': True, 'destOverride': ['http', 'tls']}}],
                    'outbounds': [{
                        'protocol': 'vless',
                        'settings': {'vnext': [{'address': host, 'port': int(port), 'users': [{'id': uuid, 'encryption': 'none'}]}]}
                    }]
                }
                with open('xray_config.json', 'w') as f:
                    json.dump(config, f)
                print('Конфиг успешно сгенерирован!')
            else:
                # Если это не vless, а готовый json/текст, просто сохраняем его
                with open('xray_config.json', 'w') as f:
                    f.write(uri)
        except Exception as e:
            print('Ошибка генерации конфига:', e)
        "

        # Останавливаем старый контейнер и запускаем чистый с готовым конфигом
        docker stop vpn-tunnel || true && docker rm vpn-tunnel || true
        
        if [ -f xray_config.json ]; then
            docker run -d --name vpn-tunnel -p 10808:10808 -v $(pwd)/xray_config.json:/etc/xray/config.json teddysun/xray
        else
            echo "Конфиг не создался, запускаем контейнер напрямую в режиме socks-proxy (на случай, если это Shadowsocks)"
            docker run -d --name vpn-tunnel -p 10808:10808 shadowsocks/shadowsocks-libev ss-local -s $(echo "$VPN_KEY" | sed -E 's/ss:\/\/([^@]+)@([^:]+):([0-9]+).*/\2/') -p $(echo "$VPN_KEY" | sed -E 's/ss:\/\/([^@]+)@([^:]+):([0-9]+).*/\3/') -l 10808 -k $(echo "$VPN_KEY" | sed -E 's/ss:\/\/([a-zA-Z0-9]+).*/\1/') -m aes-256-gcm || true
        fi

        # Ждем 5 секунд, пока контейнер поднимется
        sleep 5
        
        # Проверяем логи контейнера, если что-то пошло не так
        echo "=== ЛОГИ VPN КЛИЕНТА ==="
        docker logs vpn-tunnel || true
        echo "========================"

    - name: Visit Website via VPN
      run: |
        python -c "
        import requests
        
        # Переключаемся на порт 10808, который мы открыли в Docker
        proxies = {
            'http': 'socks5h://127.0.0.1:10808',
            'https': 'socks5h://127.0.0.1:10808'
        }

        try:
            print('Делаем запрос к vpn.works через Docker Xray туннель...')
            response = requests.get('https://vpn.works', proxies=proxies, timeout=15)
            
            print(f'\n[УСПЕХ] Сайт ответил кодом: {response.status_code}')
            print('='*40)
            print(response.text[:600])
            print('='*40)
            
        except Exception as e:
            print(f'\n[ОШИБКА] Трафик не пошел: {e}')
        "
